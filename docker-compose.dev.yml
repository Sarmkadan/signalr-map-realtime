version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: signalr-map-realtime-db-dev
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data-dev:/var/opt/mssql
    networks:
      - signalr-network-dev
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signalr-map-realtime-cache-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - signalr-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signalr-map-realtime-api-dev
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=SignalRMapRealtimeDb;User Id=sa;Password=YourPassword123!;Encrypt=false;Connection Timeout=30;"
      Caching__RedisConnectionString: "redis:6379"
      Logging__LogLevel__Default: "Debug"
      Logging__LogLevel__Microsoft: "Information"
      Logging__LogLevel__Microsoft.Hosting.Lifetime: "Information"
    ports:
      - "5000:8080"
      - "5678:5678"  # Debug port
    volumes:
      - ./src/SignalRMapRealtime:/app/src/SignalRMapRealtime
      - ./signalr-map-realtime.sln:/app/signalr-map-realtime.sln
      - ~/.aspnet/https:/https:ro
      - ~/.microsoft/usersecrets:/root/.microsoft/usersecrets:ro
    networks:
      - signalr-network-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["dotnet", "watch", "run", "--no-launch-profile", "--verbose"]

volumes:
  sqlserver-data-dev:
  redis-data-dev:

networks:
  signalr-network-dev:
    driver: bridge
